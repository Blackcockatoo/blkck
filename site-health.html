<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Site Health — Blue $nake Studio</title>
  <meta name="robots" content="noindex" />
  <link rel="icon" href="icon.svg" type="image/svg+xml" />
  <meta name="theme-color" content="#04101d" />
  <style>
    :root { --night:#02070d; --navy:#04101d; --ink:#f4f0e4; --muted:#9eb0bd; --dim:#4e6575; --gold:#e7c767; --pink:#ff006e; --cyan:#00f5ff; --green:#00f564; --line:rgba(120,214,247,.2); }
    *, *::before, *::after { box-sizing: border-box; }
    html { background: var(--night); }
    body { margin: 0; color: var(--ink); background: linear-gradient(145deg, #071b2c, var(--night) 62%); font-family: "Segoe UI", Inter, system-ui, sans-serif; line-height: 1.55; min-height: 100dvh; }
    a { color: inherit; }
    .shell { width: min(900px, calc(100% - 32px)); margin: 0 auto; padding: 32px 0 64px; }
    .masthead { display: flex; justify-content: space-between; align-items: center; gap: 16px; padding: 16px 0 32px; border-bottom: 1px solid var(--line); margin-bottom: 36px; }
    .brand { display: inline-flex; align-items: center; gap: 10px; text-decoration: none; font-size: 12px; font-weight: 900; letter-spacing: .2em; text-transform: uppercase; }
    .brand-mark { display: grid; place-items: center; width: 34px; height: 34px; border: 2px solid var(--pink); border-radius: 8px; color: var(--cyan); transform: rotate(30deg); flex-shrink: 0; }
    .mast-links { display: flex; gap: 14px; font-size: 11px; font-weight: 700; letter-spacing: .14em; text-transform: uppercase; }
    .mast-links a { color: var(--cyan); text-decoration: none; }
    h1 { margin: 0 0 6px; font-family: Georgia, serif; font-size: clamp(32px, 5vw, 56px); font-weight: 400; letter-spacing: -.03em; color: var(--ink); line-height: .95; }
    .subtitle { color: var(--muted); font-size: 14px; margin: 0 0 32px; }
    .run-btn { display: inline-flex; align-items: center; gap: 8px; min-height: 40px; padding: 10px 18px; border: 2px solid rgba(0,245,255,.42); border-radius: 10px; color: var(--cyan); background: rgba(0,245,255,.06); font: 900 11px/1 "Segoe UI", system-ui, sans-serif; letter-spacing: .16em; text-transform: uppercase; cursor: pointer; transition: transform 140ms; }
    .run-btn:hover { transform: translateY(-2px); }
    .summary { display: flex; gap: 20px; margin: 20px 0 28px; font-size: 13px; color: var(--muted); }
    .summary b { font-size: 22px; display: block; line-height: 1; margin-bottom: 2px; }
    .summary .s-pass b { color: var(--green); }
    .summary .s-fail b { color: var(--pink); }
    .summary .s-pend b { color: var(--gold); }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    thead th { text-align: left; padding: 8px 10px; font-size: 10px; font-weight: 900; letter-spacing: .16em; text-transform: uppercase; color: var(--dim); border-bottom: 1px solid var(--line); }
    tbody tr { border-bottom: 1px solid rgba(120,214,247,.07); }
    tbody tr:last-child { border-bottom: 0; }
    td { padding: 10px 10px; vertical-align: middle; }
    td:first-child { font-family: "Cascadia Code", "Fira Code", monospace; font-size: 12px; color: var(--muted); word-break: break-all; }
    td:nth-child(2) { color: var(--muted); font-size: 12px; max-width: 200px; }
    .badge { display: inline-flex; align-items: center; gap: 6px; padding: 3px 10px; border-radius: 999px; font-size: 10px; font-weight: 900; letter-spacing: .12em; text-transform: uppercase; white-space: nowrap; }
    .badge-pass { background: rgba(0,245,100,.10); color: var(--green); }
    .badge-fail { background: rgba(255,0,110,.12); color: var(--pink); }
    .badge-pend { background: rgba(231,199,103,.10); color: var(--gold); }
    .badge::before { content: ""; width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
    .footer { margin-top: 40px; padding-top: 20px; border-top: 1px solid var(--line); color: var(--dim); font-size: 12px; }
    .footer a { color: var(--muted); text-decoration: none; }
  </style>
</head>
<body>
  <div class="shell">
    <header class="masthead">
      <a class="brand" href="index.html">
        <span class="brand-mark" aria-hidden="true">B$S</span>
        <span>Blue $nake Studio</span>
      </a>
      <nav class="mast-links">
        <a href="index.html">Moss Tree</a>
        <a href="proof-wall.html">Proof Wall</a>
        <a href="print.html">Print Vault</a>
      </nav>
    </header>

    <h1>Site Health</h1>
    <p class="subtitle">Manual verification tool — checks that critical portal routes return HTTP 200. Not indexed by search engines.</p>

    <button class="run-btn" id="run-btn" type="button">Run checks</button>

    <div class="summary" id="summary" hidden>
      <div class="s-pass"><b id="cnt-pass">0</b> Pass</div>
      <div class="s-fail"><b id="cnt-fail">0</b> Fail</div>
      <div class="s-pend"><b id="cnt-pend">0</b> Pending</div>
    </div>

    <table>
      <thead>
        <tr>
          <th>Route</th>
          <th>Description</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody id="results"></tbody>
    </table>

    <footer class="footer">
      <p>Blue $nake Studio · <a href="https://blkck2.com/">blkck2.com</a> · Internal tool. <a href="proof-wall.html">Back to Proof Wall</a></p>
    </footer>
  </div>

  <script>
    const ROUTES = [
      { url: './',                                              label: 'Homepage (index.html)' },
      { url: './start.html',                                    label: 'Start Here' },
      { url: './proof-wall.html',                               label: 'Proof Wall' },
      { url: './print.html',                                    label: 'Print Vault' },
      { url: './qr-portal.html',                                label: 'QR Portal' },
      { url: './press-kit.html',                                label: 'Press Kit' },
      { url: './meta-pet.html',                                 label: 'Meta-Pet page' },
      { url: './teacher-tools.html',                            label: 'Teacher Tools page' },
      { url: './strongman-tracker.html',                        label: 'Strongman Tracker' },
      { url: './apps/bs-word-cube.html',                        label: 'B$S Word Cube' },
      { url: './apps/moss60-oracle-warden.html',               label: 'Moss60 Oracle Warden' },
      { url: './privacy-policy.html',                          label: 'Privacy Policy' },
      { url: './field-guide.html',                             label: 'Field Guide' },
      { url: './black-wing-crew.html',                         label: 'Black Wing Crew' },
      { url: './site-health.html',                             label: 'Site Health (this page)' },
      { url: './data/gallery-items.js',                         label: 'Gallery data' },
      { url: './data/studio-sections.js',                       label: 'Studio sections data' },
      { url: './manifest.webmanifest',                          label: 'PWA manifest' },
      { url: './downloads/black-wing-crew-lyric-sheet.html',    label: 'Download: BWC Lyric Sheet' },
      { url: './downloads/metapet-starter-sheet.html',          label: 'Download: Meta-Pet Starter' },
      { url: './downloads/moss-60-glyph-sheet.html',            label: 'Download: Moss 60 Glyph Sheet' },
      { url: './downloads/bss-colouring-page.html',             label: 'Download: Colouring Page' },
      { url: './downloads/qr-poster-drop.html',                 label: 'Download: QR Poster Drop' },
      { url: './downloads/bss-proof-wall.html',                 label: 'Download: Proof Wall Sheet' },
    ];

    const tbody = document.getElementById('results');
    const cntPass = document.getElementById('cnt-pass');
    const cntFail = document.getElementById('cnt-fail');
    const cntPend = document.getElementById('cnt-pend');
    const summary = document.getElementById('summary');

    function badge(state, text) {
      const span = document.createElement('span');
      span.className = 'badge badge-' + state;
      span.textContent = text;
      return span;
    }

    function updateSummary() {
      const rows = tbody.querySelectorAll('tr');
      let pass = 0, fail = 0, pend = 0;
      rows.forEach(function (r) {
        const b = r.querySelector('.badge');
        if (!b) { pend++; return; }
        if (b.classList.contains('badge-pass')) pass++;
        else if (b.classList.contains('badge-fail')) fail++;
        else pend++;
      });
      cntPass.textContent = pass;
      cntFail.textContent = fail;
      cntPend.textContent = pend;
    }

    function buildTable() {
      tbody.innerHTML = '';
      ROUTES.forEach(function (route) {
        const tr = document.createElement('tr');
        tr.innerHTML =
          '<td>' + route.url + '</td>' +
          '<td>' + route.label + '</td>' +
          '<td id="st-' + encodeURIComponent(route.url) + '"></td>';
        tbody.appendChild(tr);
      });
    }

    function checkAll() {
      summary.hidden = false;
      ROUTES.forEach(function (route) {
        const cell = document.getElementById('st-' + encodeURIComponent(route.url));
        if (!cell) return;
        cell.innerHTML = '';
        cell.appendChild(badge('pend', 'Checking…'));

        fetch(route.url, { method: 'HEAD', cache: 'no-store' })
          .then(function (r) {
            cell.innerHTML = '';
            if (r.ok) {
              cell.appendChild(badge('pass', 'PASS ' + r.status));
            } else {
              cell.appendChild(badge('fail', 'FAIL ' + r.status));
            }
            updateSummary();
          })
          .catch(function () {
            cell.innerHTML = '';
            cell.appendChild(badge('fail', 'FAIL (network)'));
            updateSummary();
          });
      });
      updateSummary();
    }

    document.getElementById('run-btn').addEventListener('click', function () {
      buildTable();
      checkAll();
    });

    buildTable();
  </script>
</body>
</html>
