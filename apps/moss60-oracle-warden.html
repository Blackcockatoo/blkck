<!doctype html>
<html lang="en">

<style>
  :root{--ink:#f5ead7;--muted:#b9ae9b;--gold:#e8c879;--moss:#72b89b;--red:#c95c5c;--blue:#69aebd;--violet:#8c78ab;--panel:rgba(11,13,18,.88);--line:rgba(232,200,121,.22)}
  *{box-sizing:border-box}html,body{height:100%;margin:0;overflow:hidden;background:#07090d;color:var(--ink);font-family:Georgia,"Times New Roman",serif}
  body{background:radial-gradient(circle at 48% 30%,#1b2430 0,#0b1017 45%,#050609 100%)}
  button{font:700 12px/1 system-ui,sans-serif;letter-spacing:.04em;color:var(--ink);border:1px solid rgba(255,255,255,.15);background:linear-gradient(#2b3037,#171a1f);border-radius:8px;padding:10px 12px;cursor:pointer;box-shadow:inset 0 1px rgba(255,255,255,.08),0 4px 16px rgba(0,0,0,.25)}
  button:hover,button:focus-visible{border-color:var(--gold);outline:none}button:active{transform:translateY(1px)}button[aria-pressed="true"]{color:#fff;border-color:var(--gold);background:linear-gradient(#48402d,#242017);box-shadow:inset 0 0 12px rgba(232,200,121,.16)}
  .app{height:100%;display:grid;grid-template-rows:auto minmax(0,1fr) auto;gap:8px;padding:8px}
  .topbar,.bottombar{display:flex;align-items:center;gap:10px;padding:9px 12px;border:1px solid var(--line);background:linear-gradient(180deg,rgba(27,31,38,.94),rgba(11,13,18,.94));box-shadow:0 14px 38px rgba(0,0,0,.28);border-radius:12px;backdrop-filter:blur(10px)}
  .brand{min-width:220px}.eyebrow{font:700 9px/1 system-ui,sans-serif;letter-spacing:.28em;color:var(--gold);text-transform:uppercase}.brand h1{font-size:clamp(19px,2.5vw,31px);line-height:.9;margin:4px 0 0;letter-spacing:-.04em;font-weight:500}.stats{display:grid;grid-template-columns:repeat(6,minmax(58px,1fr));gap:6px;flex:1}.stat{border-left:1px solid rgba(255,255,255,.12);padding:2px 8px}.stat span{display:block;font:700 8px/1.2 system-ui,sans-serif;text-transform:uppercase;letter-spacing:.1em;color:var(--muted)}.stat b{font:700 16px/1.25 system-ui,sans-serif}.stat b.hot{color:var(--gold)}
  #stage{position:relative;min-height:0;overflow:hidden;border:1px solid rgba(232,200,121,.25);border-radius:14px;background:#0a0d12;box-shadow:inset 0 0 70px #000,0 18px 52px rgba(0,0,0,.35)}canvas{display:block;width:100%;height:100%;touch-action:none}
  .vignette{position:absolute;inset:0;pointer-events:none;box-shadow:inset 0 0 90px 18px rgba(0,0,0,.7)}
  .notice{position:absolute;left:50%;top:14px;transform:translate(-50%,-130%);width:min(590px,calc(100% - 28px));padding:11px 15px;text-align:center;background:linear-gradient(180deg,rgba(22,25,31,.97),rgba(8,10,14,.94));border:1px solid rgba(232,200,121,.38);border-radius:10px;box-shadow:0 12px 40px #000;transition:transform .3s ease;pointer-events:none}.notice.show{transform:translate(-50%,0)}.notice strong{color:var(--gold);letter-spacing:.04em}.notice small{display:block;margin-top:3px;color:var(--muted);font:11px/1.35 system-ui,sans-serif}
  .phasecard,.result{position:absolute;inset:0;display:grid;place-items:center;background:rgba(3,5,8,.72);backdrop-filter:blur(4px);opacity:0;pointer-events:none;transition:.28s}.phasecard.show,.result.show{opacity:1;pointer-events:auto}.card{width:min(500px,calc(100% - 30px));padding:24px;text-align:center;border:1px solid rgba(232,200,121,.36);background:linear-gradient(145deg,rgba(30,34,42,.97),rgba(9,11,15,.98));border-radius:14px;box-shadow:0 30px 80px #000}.roman{color:var(--gold);font:700 10px system-ui,sans-serif;letter-spacing:.3em}.card h2{font-weight:400;font-size:clamp(30px,6vw,55px);margin:6px 0}.card p{color:var(--muted);font:14px/1.5 system-ui,sans-serif}.card .rank{font:400 76px/1 Georgia;color:var(--gold);text-shadow:0 0 30px rgba(232,200,121,.32)}
  .orbs{display:flex;gap:6px}.orb{min-width:104px}.orb i{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:5px;box-shadow:0 0 8px currentColor}.blue i{color:var(--blue);background:var(--blue)}.red i{color:var(--red);background:var(--red)}.black i{color:var(--violet);background:var(--violet)}
  .controls{display:flex;gap:6px;margin-left:auto}.hint{font:11px/1.35 system-ui,sans-serif;color:var(--muted);max-width:380px}.ability{color:var(--gold)}
  @media(max-width:840px){.app{padding:5px;gap:5px}.topbar{align-items:flex-start}.brand{min-width:150px}.brand h1{font-size:20px}.stats{grid-template-columns:repeat(3,1fr)}.stat:nth-child(n+4){display:none}.bottombar{flex-wrap:wrap}.hint{order:3;max-width:none;width:100%}.controls{margin-left:auto}.orb{min-width:0;padding:9px}.orb .label{display:none}}
  @media(max-width:480px){.topbar{padding:7px}.brand{min-width:126px}.eyebrow{font-size:7px}.brand h1{font-size:17px}.stat{padding:1px 5px}.stat b{font-size:14px}.bottombar{padding:7px}.controls button:not(#soundBtn){display:none}}
  @media(prefers-reduced-motion:reduce){.notice,.phasecard,.result{transition:none}}
</style>

<body>
<main class="app">
  <header class="topbar">
    <div class="brand"><div class="eyebrow">Moss60 presents</div><h1>Oracle Warden</h1></div>
    <div class="stats" aria-live="polite">
      <div class="stat"><span>Phase</span><b id="phaseHud">I · Reading</b></div>
      <div class="stat"><span>Orbs</span><b id="shotsHud">4</b></div>
      <div class="stat"><span>Oracle</span><b id="hpHud">100%</b></div>
      <div class="stat"><span>Score</span><b id="scoreHud">0</b></div>
      <div class="stat"><span>Chain</span><b id="comboHud">×1.0</b></div>
      <div class="stat"><span>Memory</span><b id="memoryHud">0%</b></div>
    </div>
  </header>
  <section id="stage" aria-label="Oracle Warden game field">
    <canvas id="game" tabindex="0"></canvas><div class="vignette"></div>
    <div class="notice show" id="notice"><strong>DRAW FROM THE WARDEN</strong><small>Drag the orb backward. Read the wind and release.</small></div>
    <div class="phasecard" id="phaseCard"><div class="card"><div class="roman" id="phaseRoman">PHASE I</div><h2 id="phaseTitle">The Reading</h2><p id="phaseText"></p><button id="phaseGo">Enter the field</button></div></div>
    <div class="result" id="result"><div class="card"><div class="roman" id="resultKicker">ORACLE BROKEN</div><div class="rank" id="rank">A</div><h2 id="resultTitle">A clean reckoning</h2><p id="resultStats"></p><button id="againBtn">Face the Oracle again</button></div></div>
  </section>
  <footer class="bottombar">
    <div class="orbs" aria-label="Choose an orb">
      <button class="orb blue" data-orb="blue" aria-pressed="true"><i></i><span class="label">Blue</span> <small>1</small></button>
      <button class="orb red" data-orb="red" aria-pressed="false"><i></i><span class="label">Red</span> <small>2</small></button>
      <button class="orb black" data-orb="black" aria-pressed="false"><i></i><span class="label">Black</span> <small>3</small></button>
    </div>
    <div class="hint" id="hint">Blue orb equipped. <span class="ability">Tap in flight</span> to repel curse bolts and steady its path.</div>
    <div class="controls"><button id="readBtn">Oracle Read</button><button id="newBtn">New Duel</button><button id="purgeBtn">Purge</button><button id="motionBtn" aria-pressed="false">Motion</button><button id="soundBtn" aria-pressed="false">Sound</button></div>
  </footer>
</main>
<script>
(()=>{'use strict';
const $=s=>document.querySelector(s), canvas=$('#game'),ctx=canvas.getContext('2d'),stage=$('#stage');
const SAVE='moss60_oracle_warden_v3', STEP=1/120, MAX_FRAME=.1, TAU=Math.PI*2;
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v)),lerp=(a,b,t)=>a+(b-a)*t,dist=(a,b,c,d)=>Math.hypot(a-c,b-d);
const ORBS={
 blue:{name:'Blue',fill:'#69aebd',rim:'#d8edf0',radius:13,speed:1,damage:1,bounce:.64,ability:'Pulse',help:'repel curse bolts and steady its path'},
 red:{name:'Red',fill:'#c95c5c',rim:'#efc07a',radius:15,speed:.96,damage:1.2,bounce:.5,ability:'Detonate',help:'detonate near structures for heavy area damage'},
 black:{name:'Black',fill:'#706184',rim:'#bfa8df',radius:12,speed:1.07,damage:.88,bounce:.78,ability:'Phase',help:'phase through one ward for a precision ambush'}
};
const PHASES=[
 {roman:'I',name:'The Reading',shots:4,text:'The Oracle watches. Break its pale eye while the field is still honest.',hp:90},
 {roman:'II',name:'The Counter',shots:4,text:'It remembers your favorite lane. Wards rise there, but their edges leave another answer.',hp:110},
 {roman:'III',name:'The Breaking',shots:5,text:'Its heart opens between attacks. Time the final shot, or be rewritten.',hp:130}
];
let save=load(),game=null,selected=save.selected||'blue',pointer={down:false,x:0,y:0},acc=0,last=performance.now(),noticeTimer=0,audio=null;
function defaults(){return{version:3,games:0,wins:0,shots:0,hits:0,angleSum:0,powerSum:0,high:0,low:0,best:0,selected:'blue',muted:false,reduced:matchMedia('(prefers-reduced-motion: reduce)').matches}}
function load(){try{return Object.assign(defaults(),JSON.parse(localStorage.getItem(SAVE)||'{}'))}catch{return defaults()}}
function persist(){localStorage.setItem(SAVE,JSON.stringify(save))}
function memory(){return Math.min(.72,1-Math.exp(-save.shots/50))}
function seeded(n){let x=n|0||1234567;return()=>{x^=x<<13;x^=x>>>17;x^=x<<5;return(x>>>0)/4294967296}}
function audioOn(){if(save.muted)return null;if(!audio)audio=new (window.AudioContext||window.webkitAudioContext)();if(audio.state==='suspended')audio.resume();return audio}
function tone(freq=.2,dur=.08,type='sine',gain=.035,slide=0){const a=audioOn();if(!a)return;const o=a.createOscillator(),g=a.createGain(),t=a.currentTime;o.type=type;o.frequency.setValueAtTime(freq,t);o.frequency.exponentialRampToValueAtTime(Math.max(30,freq+slide),t+dur);g.gain.setValueAtTime(gain,t);g.gain.exponentialRampToValueAtTime(.0001,t+dur);o.connect(g).connect(a.destination);o.start(t);o.stop(t+dur)}
function sound(kind){if(kind==='launch')tone(180,.16,'triangle',.055,240);if(kind==='hit')tone(90,.09,'square',.035,-35);if(kind==='break'){tone(70,.22,'sawtooth',.05,-30);setTimeout(()=>tone(170,.12,'triangle',.03,-90),35)}if(kind==='ability')tone(420,.22,'sine',.05,380);if(kind==='warn')tone(150,.25,'sawtooth',.025,80);if(kind==='crit'){tone(520,.25,'triangle',.06,440);setTimeout(()=>tone(780,.2,'sine',.04,260),40)}}
function vibrate(ms){if(navigator.vibrate&&!save.reduced)navigator.vibrate(ms)}
function world(){const r=stage.getBoundingClientRect();return{w:r.width,h:r.height}}
function resize(){const old=game&&{w:game.w,h:game.h};const z=world(),d=Math.min(2,devicePixelRatio||1);canvas.width=Math.round(z.w*d);canvas.height=Math.round(z.h*d);canvas.style.width=z.w+'px';canvas.style.height=z.h+'px';ctx.setTransform(d,0,0,d,0,0);if(game&&old.w&&old.h){const sx=z.w/old.w,sy=z.h/old.h;scaleState(sx,sy);game.w=z.w;game.h=z.h;game.ground*=sy;game.sling.x*=sx;game.sling.y*=sy;game.drag.x*=sx;game.drag.y*=sy;game.boss.x*=sx;game.boss.y*=sy}}
function scaleState(sx,sy){for(const list of [game.blocks,game.enemies,game.bolts,game.particles])for(const o of list){o.x*=sx;o.y*=sy;if('vx'in o)o.vx*=sx;if('vy'in o)o.vy*=sy;if('w'in o)o.w*=sx;if('h'in o)o.h*=sy}if(game.orb){game.orb.x*=sx;game.orb.y*=sy;game.orb.vx*=sx;game.orb.vy*=sy;for(const p of game.orb.trail){p.x*=sx;p.y*=sy}}}
function newDuel(){const z=world(),m=memory(),seed=(save.games+1)*7919+save.shots*101;game={w:z.w,h:z.h,ground:z.h*.82,sling:{x:Math.max(65,z.w*.105),y:z.h*.68},drag:{x:0,y:0},phase:0,shots:0,score:0,combo:1,maxCombo:1,boss:{x:z.w*.82,y:z.h*.43,r:34,hp:0,maxHp:0,weakAngle:Math.PI,weakOpen:true,openClock:0,charge:0},blocks:[],enemies:[],bolts:[],particles:[],texts:[],orb:null,ready:false,dragging:false,over:false,paused:true,shake:0,flash:0,hitStop:0,time:0,shotHits:0,totalHits:0,shotsUsed:0,rng:seeded(seed),memory:m,wind:0,forecast:null};beginPhase(0,true);updateOrbUI();updateHud()}
function beginPhase(i,intro=false){game.phase=i;const p=PHASES[i];game.shots=p.shots;game.boss.maxHp=p.hp;game.boss.hp=p.hp;game.boss.weakOpen=i===0;game.boss.openClock=0;game.boss.charge=0;game.orb=null;game.ready=false;game.paused=true;buildField();$('#phaseRoman').textContent='PHASE '+p.roman;$('#phaseTitle').textContent=p.name;$('#phaseText').textContent=p.text;$('#phaseGo').textContent=intro?'Enter the field':'Press the advantage';$('#phaseCard').classList.add('show');updateHud()}
function buildField(){const g=game,W=g.w,H=g.h,G=g.ground,r=g.rng,m=g.memory,i=g.phase;g.blocks=[];g.enemies=[];g.bolts=[];g.wind=((r()-.5)*.15)+(i*.018*(r()>.5?1:-1));const avgA=save.shots?save.angleSum/save.shots:-.65;const laneY=clamp(G-(Math.abs(avgA)*H*.34),H*.28,G-65);g.forecast=i?{x:W*.58,y:laneY}:null;
 const add=(x,y,w,h,hp,type)=>g.blocks.push({x,y,w,h,hp,maxHp:hp,type,cool:0,shake:0});
 const tower=W*.66;add(tower,G-70,34,70,26,'wood');add(tower+68,G-70,34,70,26,'wood');add(tower-10,G-94,122,24,34,'stone');add(tower+18,G-154,30,60,24,'wood');add(tower+64,G-154,30,60,24,'wood');add(tower+8,G-178,96,22,38,'stone');
 g.enemies.push({x:tower+55,y:G-202,r:15,hp:22,maxHp:22,alive:true,type:'moth',cool:0});
 if(i>0){const count=2+i;for(let n=0;n<count;n++){const y=clamp(laneY+(n-(count-1)/2)*55+(r()-.5)*24,H*.22,G-50);const x=clamp(W*(.50+n*.075)+(r()-.5)*25,W*.42,W*.76);add(x,y,18+(n%2)*42,58-(n%2)*38,28+i*7,'ward')}}
 if(i===2){add(W*.76,H*.23,18,H*.32,44,'glass');g.enemies.push({x:W*.52,y:G-48,r:14,hp:18,maxHp:18,alive:true,type:'bait',cool:0})}
}
function startPhase(){game.paused=false;game.ready=true;$('#phaseCard').classList.remove('show');notice('AIM WITH INTENT',game.phase?'The gold haze marks the lane it expects. Make it wrong.':'The pale eye is vulnerable. Ricochets build a higher chain.');tone(110,.5,'sine',.025,90)}
function selectOrb(type){if(!ORBS[type]||game&&game.orb)return;selected=type;save.selected=type;persist();updateOrbUI()}
function updateOrbUI(){document.querySelectorAll('.orb').forEach(b=>b.setAttribute('aria-pressed',String(b.dataset.orb===selected)));const o=ORBS[selected];$('#hint').innerHTML=`${o.name} orb equipped. <span class="ability">Tap in flight</span> to ${o.help}.`;}
function launch(){if(!game.ready||game.paused||game.over)return;const s=game.sling,dx=s.x-game.drag.x,dy=s.y-game.drag.y,pull=Math.hypot(dx,dy);if(pull<18){game.dragging=false;return}const cfg=ORBS[selected],power=clamp(pull/145,0,1),scale=4.8;game.orb={x:s.x+12,y:s.y-42,vx:dx*scale*cfg.speed,vy:dy*scale*cfg.speed,r:cfg.radius,type:selected,damage:cfg.damage,bounce:cfg.bounce,age:0,alive:true,ability:true,phaseTime:0,trail:[],contacts:new Set(),launched:{angle:Math.atan2(dy,dx),power},closest:9999};game.shots--;game.shotsUsed++;game.ready=false;game.dragging=false;game.shotHits=0;burst(game.orb.x,game.orb.y,14,cfg.fill);sound('launch');vibrate(12);updateHud()}
function ability(){const o=game&&game.orb;if(!o||!o.alive||!o.ability||game.paused)return;o.ability=false;game.flash=.12;sound('ability');vibrate(18);if(o.type==='blue'){o.vx*=.96;o.vy*=.72;let n=0;for(const b of game.bolts)if(b.alive&&dist(o.x,o.y,b.x,b.y)<125){b.alive=false;n++;burst(b.x,b.y,14,'#69aebd')}award(120*n,'DEFLECT')}else if(o.type==='red'){burst(o.x,o.y,38,'#c95c5c');let hit=0;for(const b of game.blocks){const d=pointRectDistance(o.x,o.y,b);if(b.hp>0&&d<105){damageBlock(b,(105-d)*.32+10,o);hit++}}for(const e of game.enemies)if(e.alive&&dist(o.x,o.y,e.x,e.y)<100){damageEnemy(e,26,o);hit++}if(dist(o.x,o.y,game.boss.x,game.boss.y)<120)damageBoss(24,o,false);if(hit)award(80*hit,'BLAST')}else{o.phaseTime=.48;floatText(o.x,o.y-22,'PHASE','#bfa8df',17)}}
function pointRectDistance(x,y,b){const cx=clamp(x,b.x,b.x+b.w),cy=clamp(y,b.y,b.y+b.h);return dist(x,y,cx,cy)}
function fixedUpdate(dt){if(!game||game.paused||game.over)return;if(game.hitStop>0){game.hitStop-=dt;return}game.time+=dt;game.shake*=Math.pow(.04,dt);game.flash=Math.max(0,game.flash-dt*1.8);for(const b of game.blocks){b.cool=Math.max(0,b.cool-dt);b.shake=Math.max(0,b.shake-dt*30)}for(const e of game.enemies)e.cool=Math.max(0,e.cool-dt);updateBoss(dt);updateBolts(dt);updateOrb(dt);for(const p of game.particles){p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=300*dt;p.life-=dt}game.particles=game.particles.filter(p=>p.life>0);for(const t of game.texts){t.y-=28*dt;t.life-=dt}game.texts=game.texts.filter(t=>t.life>0)}
function updateOrb(dt){const o=game.orb;if(!o||!o.alive)return;o.age+=dt;o.phaseTime=Math.max(0,o.phaseTime-dt);o.vx+=game.wind*60*dt;o.vy+=520*dt;o.x+=o.vx*dt;o.y+=o.vy*dt;o.trail.push({x:o.x,y:o.y});if(o.trail.length>25)o.trail.shift();o.closest=Math.min(o.closest,Math.max(0,dist(o.x,o.y,game.boss.x,game.boss.y)-game.boss.r));
 if(o.y+o.r>game.ground){o.y=game.ground-o.r;if(o.vy>0){o.vy*=-o.bounce;o.vx*=.78;o.contacts.clear();burst(o.x,o.y,6,'#a58f72');game.shake=Math.max(game.shake,2)}}
 for(const b of game.blocks){if(b.hp<=0)continue;const key=game.blocks.indexOf(b);if(o.phaseTime>0&&b.type==='ward')continue;if(circleRect(o,b)){if(!o.contacts.has(key)&&b.cool<=0){o.contacts.add(key);damageBlock(b,Math.hypot(o.vx,o.vy)*.045*o.damage+3,o);resolveRect(o,b)} }else o.contacts.delete(key)}
 for(const e of game.enemies)if(e.alive&&e.cool<=0&&dist(o.x,o.y,e.x,e.y)<o.r+e.r){damageEnemy(e,10+Math.hypot(o.vx,o.vy)*.05*o.damage,o);e.cool=.22;o.vx*=-.55;o.vy*=-.55}
 const b=game.boss;if(dist(o.x,o.y,b.x,b.y)<o.r+b.r&&b.cool<=0){const ang=Math.atan2(o.y-b.y,o.x-b.x),weak=Math.abs(angleDiff(ang,b.weakAngle))<.48&&b.weakOpen;damageBoss(8+Math.hypot(o.vx,o.vy)*.045*o.damage,o,weak);b.cool=.25;o.vx*=-.62;o.vy*=-.58}
 if(o.x<-100||o.x>game.w+110||o.y>game.h+100||o.age>9||(Math.hypot(o.vx,o.vy)<18&&o.age>1.2))endShot()}
function resolveRect(o,b){const left=Math.abs((o.x+o.r)-b.x),right=Math.abs((b.x+b.w)-(o.x-o.r)),top=Math.abs((o.y+o.r)-b.y),bottom=Math.abs((b.y+b.h)-(o.y-o.r)),m=Math.min(left,right,top,bottom);if(m===left){o.x=b.x-o.r;o.vx=-Math.abs(o.vx)*.68}else if(m===right){o.x=b.x+b.w+o.r;o.vx=Math.abs(o.vx)*.68}else if(m===top){o.y=b.y-o.r;o.vy=-Math.abs(o.vy)*.68}else{o.y=b.y+b.h+o.r;o.vy=Math.abs(o.vy)*.68}}
function circleRect(o,b){return pointRectDistance(o.x,o.y,b)<=o.r}
function damageBlock(b,d,o){if(b.hp<=0||b.cool>0)return;b.cool=.055;b.hp-=d;b.shake=5;game.shotHits++;game.totalHits++;advanceCombo();burst(o.x,o.y,Math.min(15,6+d/3),b.type==='ward'?'#69aebd':b.type==='wood'?'#986b43':'#c5bca9');award(Math.round(d*8),b.type==='ward'?'WARD':'HIT');sound('hit');if(b.hp<=0){b.hp=0;award(b.type==='ward'?500:300,'BREAK');burst(b.x+b.w/2,b.y+b.h/2,26,b.type==='ward'?'#69aebd':'#e8c879');sound('break');game.hitStop=save.reduced?0:.035;game.shake=Math.max(game.shake,6)}}
function damageEnemy(e,d,o){e.hp-=d;game.shotHits++;game.totalHits++;advanceCombo();award(Math.round(d*12),'OMEN');burst(e.x,e.y,18,e.type==='bait'?'#72b89b':'#c95c5c');if(e.hp<=0){e.alive=false;award(600,'OMEN DOWN');sound('break')}}
function damageBoss(d,o,weak){const b=game.boss;if(weak){d*=2.25;award(900,'CRITICAL');sound('crit');game.hitStop=save.reduced?0:.075;game.shake=Math.max(game.shake,9)}else{award(Math.round(d*10),'READ')}b.hp=Math.max(0,b.hp-d);game.shotHits++;game.totalHits++;advanceCombo();burst(b.x,b.y,weak?30:18,weak?'#e8c879':'#c95c5c');updateHud();if(b.hp<=0)phaseWon()}
function angleDiff(a,b){return Math.atan2(Math.sin(a-b),Math.cos(a-b))}
function advanceCombo(){game.combo=Math.min(4,game.combo+.25);game.maxCombo=Math.max(game.maxCombo,game.combo)}
function award(n,label){const pts=Math.round(n*game.combo);game.score+=pts;if(label)floatText(game.orb?game.orb.x:game.boss.x,game.orb?game.orb.y-22:game.boss.y-50,`${label} +${pts}`,'#e8c879',14);updateHud()}
function endShot(){const o=game.orb;if(!o||!o.alive)return;o.alive=false;save.shots++;save.angleSum+=o.launched.angle;save.powerSum+=o.launched.power;if(o.launched.angle<-.85)save.high++;else if(o.launched.angle>-.38)save.low++;if(game.shotHits){save.hits++;award(Math.round(250*Math.min(1,o.launched.power)),'ACCURATE')}else game.combo=1;persist();if(game.boss.hp<=0)return;if(game.shots<=0){finish(false);return}setTimeout(()=>{if(!game.over&&!game.paused){game.orb=null;game.ready=true;notice(game.shotHits?'THE ORACLE FLINCHES':'THE ORACLE LEARNS',game.shotHits?'Chain preserved. Choose the next answer.':'Change angle, power, or orb before it closes the lane.');updateHud()}},450)}
function phaseWon(){if(game.paused||game.over)return;game.paused=true;const bonus=game.shots*700;game.score+=bonus;if(game.phase<2){notice('PHASE BROKEN',`Reserve bonus +${bonus}. The Oracle is rebuilding.`);setTimeout(()=>beginPhase(game.phase+1),900)}else finish(true)}
function finish(win){game.over=true;game.paused=true;save.games++;if(win)save.wins++;const bonus=win?5000+game.shots*1000:0;game.score+=bonus;save.best=Math.max(save.best,game.score);persist();const ratio=game.score/(win?19000:15000),rank=ratio>1.3?'S':ratio>1?'A':ratio>.7?'B':'C';$('#rank').textContent=rank;$('#resultKicker').textContent=win?'ORACLE BROKEN':'THE ORACLE REMEMBERS';$('#resultTitle').textContent=win?'A clean reckoning':'Your lesson survives you';$('#resultStats').innerHTML=`Score <b>${game.score.toLocaleString()}</b> · Best <b>${save.best.toLocaleString()}</b><br>Hits ${game.totalHits} · Highest chain ×${game.maxCombo.toFixed(2)} · Memory ${Math.round(memory()*100)}%`;$('#result').classList.add('show');sound(win?'crit':'warn');updateHud()}
function updateBoss(dt){const b=game.boss;b.cool=Math.max(0,(b.cool||0)-dt);b.openClock+=dt;const period=game.phase===2?3.6:4.8;if(game.phase>0){const open=(b.openClock%period)>period-(game.phase===2?1.25:1.55);if(open&&!b.weakOpen){sound('warn');floatText(b.x,b.y-b.r-28,'EYE OPEN','#e8c879',14)}b.weakOpen=open;b.weakAngle=Math.PI+Math.sin(game.time*.7)*.75}
 const o=game.orb;if(game.phase>0&&o&&o.alive){b.charge+=dt;const interval=(game.phase===2?1.8:2.65)+(.5-game.memory*.4);if(b.charge>interval){b.charge=0;fireBolt(o)}}}
function fireBolt(o){const b=game.boss,lead=.42+game.memory*.45,tx=o.x+o.vx*lead,ty=o.y+o.vy*lead+260*lead*lead,dx=tx-b.x,dy=ty-b.y,len=Math.hypot(dx,dy)||1,speed=245+game.phase*45+game.memory*55;game.bolts.push({x:b.x,y:b.y,vx:dx/len*speed,vy:dy/len*speed,r:7,alive:true,age:0,telegraph:.38});floatText(b.x,b.y-b.r-18,'LOCK','#c95c5c',13);sound('warn')}
function updateBolts(dt){const o=game.orb;for(const b of game.bolts){if(!b.alive)continue;b.age+=dt;if(b.telegraph>0){b.telegraph-=dt;continue}b.x+=b.vx*dt;b.y+=b.vy*dt;if(o&&o.alive&&dist(b.x,b.y,o.x,o.y)<b.r+o.r){b.alive=false;o.vx*=.74;o.vy-=95;o.vy*=.8;burst(o.x,o.y,20,'#8c78ab');floatText(o.x,o.y-18,'CURSED','#bfa8df',15);game.shake=7;sound('hit');vibrate(25)}if(b.age>3||b.x<0||b.x>game.w||b.y<0||b.y>game.h)b.alive=false}game.bolts=game.bolts.filter(b=>b.alive)}
function burst(x,y,n,color){for(let i=0;i<n;i++){const a=game.rng()*TAU,s=40+game.rng()*180;game.particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:.3+game.rng()*.55,color,size:1+game.rng()*3})}}
function floatText(x,y,text,color,size){game.texts.push({x,y,text,color,size,life:.85})}
function notice(title,text){const n=$('#notice');n.innerHTML=`<strong>${title}</strong><small>${text}</small>`;n.classList.add('show');clearTimeout(noticeTimer);noticeTimer=setTimeout(()=>n.classList.remove('show'),3200)}
function updateHud(){if(!game)return;const p=PHASES[game.phase];$('#phaseHud').textContent=`${p.roman} · ${p.name.replace('The ','')}`;$('#shotsHud').textContent=game.shots;$('#hpHud').textContent=Math.ceil(game.boss.hp/game.boss.maxHp*100)+'%';$('#scoreHud').textContent=game.score.toLocaleString();$('#comboHud').textContent='×'+game.combo.toFixed(2);$('#memoryHud').textContent=Math.round(memory()*100)+'%';$('#comboHud').classList.toggle('hot',game.combo>1)}
function draw(){if(!game)return;const W=game.w,H=game.h,t=game.time;ctx.clearRect(0,0,W,H);ctx.save();if(game.shake&&!save.reduced)ctx.translate((Math.random()-.5)*game.shake,(Math.random()-.5)*game.shake);drawSky(W,H,t);drawLandscape(W,H,t);drawForecast();drawGround();drawWarden();drawAim();drawBlocks();drawEnemies();drawBoss();drawBolts();drawOrb();drawParticles();drawTexts();drawWind();ctx.restore();if(game.flash&&!save.reduced){ctx.fillStyle=`rgba(245,234,215,${game.flash})`;ctx.fillRect(0,0,W,H)}}
function drawSky(W,H,t){const g=ctx.createLinearGradient(0,0,0,H);g.addColorStop(0,'#111b27');g.addColorStop(.55,'#293032');g.addColorStop(1,'#111216');ctx.fillStyle=g;ctx.fillRect(0,0,W,H);const moon=ctx.createRadialGradient(W*.73,H*.18,3,W*.73,H*.18,H*.22);moon.addColorStop(0,'rgba(237,220,178,.72)');moon.addColorStop(.12,'rgba(204,192,158,.22)');moon.addColorStop(1,'rgba(180,190,180,0)');ctx.fillStyle=moon;ctx.fillRect(0,0,W,H);ctx.globalAlpha=.13;ctx.strokeStyle='#d7ccb2';for(let i=0;i<18;i++){const y=(i*47+t*4)%Math.max(1,H*.68);ctx.beginPath();ctx.moveTo(0,y);ctx.bezierCurveTo(W*.3,y-18,W*.68,y+20,W,y-5);ctx.stroke()}ctx.globalAlpha=1}
function drawLandscape(W,H,t){const G=game.ground;ctx.fillStyle='#151c22';ctx.beginPath();ctx.moveTo(0,G);for(let x=0;x<=W;x+=25)ctx.lineTo(x,H*.55-Math.sin(x*.012+t*.03)*18-Math.cos(x*.027)*14);ctx.lineTo(W,G);ctx.fill();ctx.fillStyle='#1c2324';ctx.beginPath();ctx.moveTo(0,G);for(let x=0;x<=W;x+=18)ctx.lineTo(x,H*.67-Math.sin(x*.018)*22-Math.cos(x*.038)*12);ctx.lineTo(W,G);ctx.fill();ctx.fillStyle='rgba(5,8,9,.55)';for(let i=0;i<12;i++){const x=(i*83+31)%W,h=25+(i%4)*13;ctx.fillRect(x,G-h,4,h);ctx.beginPath();ctx.moveTo(x-14,G-h+8);ctx.lineTo(x+2,G-h-12);ctx.lineTo(x+16,G-h+8);ctx.fill()}}
function drawGround(){const G=game.ground,g=ctx.createLinearGradient(0,G,0,game.h);g.addColorStop(0,'#29251d');g.addColorStop(.2,'#171612');g.addColorStop(1,'#070809');ctx.fillStyle=g;ctx.fillRect(0,G,game.w,game.h-G);ctx.strokeStyle='rgba(232,200,121,.35)';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(0,G);ctx.lineTo(game.w,G);ctx.stroke()}
function drawForecast(){const f=game.forecast;if(!f)return;ctx.save();const grad=ctx.createRadialGradient(f.x,f.y,4,f.x,f.y,115);grad.addColorStop(0,'rgba(232,200,121,.12)');grad.addColorStop(1,'rgba(232,200,121,0)');ctx.fillStyle=grad;ctx.beginPath();ctx.arc(f.x,f.y,115,0,TAU);ctx.fill();ctx.setLineDash([4,9]);ctx.strokeStyle='rgba(232,200,121,.2)';ctx.beginPath();ctx.arc(f.x,f.y,64,0,TAU);ctx.stroke();ctx.restore()}
function drawWarden(){const s=game.sling,t=game.time,bob=Math.sin(t*2)*2;ctx.save();ctx.translate(s.x,s.y+bob);ctx.fillStyle='rgba(0,0,0,.4)';ctx.beginPath();ctx.ellipse(0,48,34,9,0,0,TAU);ctx.fill();const c=ctx.createLinearGradient(-24,-20,22,48);c.addColorStop(0,'#33403d');c.addColorStop(.5,'#192323');c.addColorStop(1,'#090c0d');ctx.fillStyle=c;ctx.beginPath();ctx.moveTo(0,-23);ctx.quadraticCurveTo(-30,1,-25,48);ctx.lineTo(25,48);ctx.quadraticCurveTo(30,1,0,-23);ctx.fill();ctx.fillStyle='#c4ad8e';ctx.beginPath();ctx.arc(0,-27,12,0,TAU);ctx.fill();ctx.fillStyle='#121a1b';ctx.beginPath();ctx.moveTo(-17,-23);ctx.quadraticCurveTo(0,-50,17,-23);ctx.lineTo(11,-16);ctx.lineTo(-11,-16);ctx.fill();ctx.fillStyle='#98d0cc';ctx.shadowColor='#69aebd';ctx.shadowBlur=9;ctx.fillRect(-6,-29,3,2);ctx.fillRect(3,-29,3,2);ctx.shadowBlur=0;ctx.strokeStyle='#5d6a66';ctx.lineWidth=8;ctx.beginPath();ctx.moveTo(5,1);ctx.lineTo(25,-13);ctx.stroke();ctx.restore();if(game.ready&&!game.paused&&!game.over){const p=game.dragging?game.drag:{x:s.x+12,y:s.y-42};drawGem(p.x,p.y,ORBS[selected].radius,ORBS[selected]);ctx.strokeStyle='rgba(232,200,121,.55)';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(s.x+20,s.y-8);ctx.lineTo(p.x,p.y);ctx.stroke()}}
function drawAim(){if(!game.dragging||!game.ready)return;const s=game.sling,c=ORBS[selected],dx=s.x-game.drag.x,dy=s.y-game.drag.y;let x=s.x+12,y=s.y-42,vx=dx*4.8*c.speed,vy=dy*4.8*c.speed;ctx.fillStyle='rgba(245,234,215,.52)';for(let i=0;i<90;i++){vx+=game.wind*60*STEP*4;vy+=520*STEP*4;x+=vx*STEP*4;y+=vy*STEP*4;if(i%4===0){ctx.globalAlpha=1-i/100;ctx.beginPath();ctx.arc(x,y,2.4,0,TAU);ctx.fill()}if(y>game.ground)break}ctx.globalAlpha=1}
function drawBlocks(){for(const b of game.blocks){if(b.hp<=0)continue;const j=b.shake&&!save.reduced?(Math.random()-.5)*b.shake:0,g=ctx.createLinearGradient(b.x,b.y,b.x+b.w,b.y+b.h);if(b.type==='wood'){g.addColorStop(0,'#9b7048');g.addColorStop(1,'#4d3426')}else if(b.type==='stone'){g.addColorStop(0,'#8e918c');g.addColorStop(1,'#464b4b')}else if(b.type==='ward'){g.addColorStop(0,'rgba(76,122,130,.9)');g.addColorStop(1,'rgba(28,45,55,.95)')}else{g.addColorStop(0,'#40384c');g.addColorStop(1,'#17151c')}ctx.fillStyle=g;ctx.strokeStyle=b.type==='ward'?'#86c2c7':b.type==='glass'?'#a992c5':'rgba(240,220,185,.3)';ctx.lineWidth=2;roundRect(b.x+j,b.y+j,b.w,b.h,4);ctx.fill();ctx.stroke();const damage=1-b.hp/b.maxHp;if(damage>.2){ctx.strokeStyle=`rgba(30,20,16,${.3+damage*.6})`;ctx.beginPath();ctx.moveTo(b.x+b.w*.25,b.y);ctx.lineTo(b.x+b.w*.52,b.y+b.h*.45);ctx.lineTo(b.x+b.w*.34,b.y+b.h);ctx.stroke()}if(b.type==='ward'){ctx.strokeStyle='rgba(232,200,121,.65)';ctx.beginPath();ctx.arc(b.x+b.w/2,b.y+b.h/2,Math.min(b.w,b.h)*.22,0,TAU);ctx.stroke()}}}
function drawEnemies(){for(const e of game.enemies){if(!e.alive)continue;ctx.save();ctx.translate(e.x,e.y+Math.sin(game.time*3+e.x)*3);ctx.fillStyle=e.type==='bait'?'#72b89b':'#b89d62';ctx.beginPath();ctx.moveTo(0,-e.r);ctx.lineTo(e.r,e.r*.7);ctx.lineTo(0,e.r*.35);ctx.lineTo(-e.r,e.r*.7);ctx.closePath();ctx.fill();ctx.fillStyle='#0b1011';ctx.beginPath();ctx.arc(0,0,4,0,TAU);ctx.fill();ctx.restore()}}
function drawBoss(){const b=game.boss,t=game.time;ctx.save();ctx.translate(b.x,b.y);for(let i=0;i<3;i++){ctx.strokeStyle=`rgba(201,92,92,${.18-i*.04})`;ctx.lineWidth=5-i;ctx.beginPath();ctx.arc(0,0,b.r+10+i*12+Math.sin(t*2+i)*3,0,TAU);ctx.stroke()}ctx.rotate(Math.sin(t*.6)*.08);const g=ctx.createRadialGradient(-10,-12,3,0,0,b.r*1.4);g.addColorStop(0,'#8b8172');g.addColorStop(.5,'#3a3533');g.addColorStop(1,'#151619');ctx.fillStyle=g;ctx.strokeStyle='#9d7659';ctx.lineWidth=3;ctx.beginPath();for(let i=0;i<12;i++){const a=i/12*TAU,r=b.r*(i%2?1:1.28);ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r)}ctx.closePath();ctx.fill();ctx.stroke();const wx=Math.cos(b.weakAngle)*b.r*.68,wy=Math.sin(b.weakAngle)*b.r*.68;ctx.fillStyle=b.weakOpen?'#f3d88d':'#281f1d';ctx.shadowColor='#e8c879';ctx.shadowBlur=b.weakOpen?18:0;ctx.beginPath();ctx.ellipse(wx,wy,b.weakOpen?8:5,b.weakOpen?5:2,b.weakAngle+Math.PI/2,0,TAU);ctx.fill();ctx.shadowBlur=0;ctx.restore();const pct=b.hp/b.maxHp;ctx.fillStyle='rgba(0,0,0,.55)';ctx.fillRect(b.x-43,b.y-b.r-22,86,6);ctx.fillStyle=pct>.5?'#72b89b':pct>.25?'#e8c879':'#c95c5c';ctx.fillRect(b.x-43,b.y-b.r-22,86*pct,6)}
function drawBolts(){for(const b of game.bolts){ctx.save();if(b.telegraph>0){const o=game.orb;ctx.setLineDash([5,8]);ctx.strokeStyle=`rgba(201,92,92,${.2+b.telegraph})`;ctx.beginPath();ctx.moveTo(game.boss.x,game.boss.y);if(o)ctx.lineTo(o.x,o.y);ctx.stroke()}else{ctx.shadowColor='#c95c5c';ctx.shadowBlur=14;ctx.fillStyle='#d77a7a';ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,TAU);ctx.fill()}ctx.restore()}}
function drawOrb(){const o=game.orb;if(!o||!o.alive)return;const c=ORBS[o.type];ctx.save();ctx.strokeStyle=c.fill;ctx.lineWidth=5;ctx.globalAlpha=.32;ctx.beginPath();o.trail.forEach((p,i)=>i?ctx.lineTo(p.x,p.y):ctx.moveTo(p.x,p.y));ctx.stroke();ctx.globalAlpha=1;if(o.phaseTime>0){ctx.setLineDash([3,4]);ctx.strokeStyle='#bfa8df';ctx.beginPath();ctx.arc(o.x,o.y,o.r+9,0,TAU);ctx.stroke()}drawGem(o.x,o.y,o.r,c);if(o.ability){ctx.strokeStyle='rgba(232,200,121,.75)';ctx.beginPath();ctx.arc(o.x,o.y,o.r+5+Math.sin(game.time*8)*2,0,TAU);ctx.stroke()}ctx.restore()}
function drawGem(x,y,r,c){const g=ctx.createRadialGradient(x-r*.35,y-r*.4,1,x,y,r*1.3);g.addColorStop(0,'#fff7e8');g.addColorStop(.3,c.fill);g.addColorStop(1,'#101214');ctx.fillStyle=g;ctx.strokeStyle=c.rim;ctx.lineWidth=2;ctx.shadowColor=c.fill;ctx.shadowBlur=12;ctx.beginPath();ctx.arc(x,y,r,0,TAU);ctx.fill();ctx.stroke();ctx.shadowBlur=0}
function drawParticles(){for(const p of game.particles){ctx.globalAlpha=clamp(p.life*2,0,1);ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,TAU);ctx.fill()}ctx.globalAlpha=1}
function drawTexts(){ctx.textAlign='center';ctx.font='700 14px system-ui';for(const t of game.texts){ctx.globalAlpha=clamp(t.life*2,0,1);ctx.fillStyle=t.color;ctx.font=`800 ${t.size}px system-ui`;ctx.fillText(t.text,t.x,t.y)}ctx.globalAlpha=1}
function drawWind(){const x=18,y=22;ctx.fillStyle='rgba(5,8,10,.55)';roundRect(x-8,y-14,112,47,8);ctx.fill();ctx.fillStyle='#d9cfbd';ctx.font='700 11px system-ui';ctx.textAlign='left';ctx.fillText(Math.abs(game.wind)<.025?'STILL AIR':game.wind>0?'WIND  →':'←  WIND',x,y);ctx.strokeStyle='rgba(105,174,189,.55)';for(let i=0;i<3;i++){ctx.beginPath();ctx.moveTo(x,y+9+i*7);ctx.quadraticCurveTo(x+34,y+4+i*7,x+75+Math.abs(game.wind)*60,y+9+i*7);ctx.stroke()}}
function roundRect(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r)}
function pointerPos(e){const r=canvas.getBoundingClientRect(),p=e.touches?e.touches[0]:e;return{x:p.clientX-r.left,y:p.clientY-r.top}}
function down(e){audioOn();canvas.focus();const p=pointerPos(e);if(game.orb&&game.orb.alive){ability();e.preventDefault();return}if(!game.ready||game.paused)return;const s=game.sling;if(dist(p.x,p.y,s.x+12,s.y-42)<65||dist(p.x,p.y,s.x,s.y)<70){game.dragging=true;pointer.down=true;move(e);e.preventDefault()}}
function move(e){if(!game.dragging)return;const p=pointerPos(e),s=game.sling,dx=p.x-s.x,dy=p.y-s.y,len=Math.hypot(dx,dy),k=len>145?145/len:1;game.drag.x=s.x+dx*k;game.drag.y=s.y+dy*k;e.preventDefault()}
function up(e){if(game.dragging){e.preventDefault();launch()}pointer.down=false}
function frame(now){const elapsed=Math.min(MAX_FRAME,(now-last)/1000);last=now;acc+=elapsed;while(acc>=STEP){fixedUpdate(STEP);acc-=STEP}draw();requestAnimationFrame(frame)}
canvas.addEventListener('pointerdown',down);canvas.addEventListener('pointermove',move);window.addEventListener('pointerup',up);canvas.addEventListener('contextmenu',e=>e.preventDefault());
document.querySelectorAll('.orb').forEach(b=>b.onclick=()=>selectOrb(b.dataset.orb));$('#phaseGo').onclick=startPhase;$('#againBtn').onclick=()=>{$('#result').classList.remove('show');newDuel()};$('#newBtn').onclick=()=>{$('#result').classList.remove('show');newDuel()};$('#readBtn').onclick=()=>{const style=save.high>save.low?'high arcs':save.shots&&save.powerSum/save.shots>.72?'hard pulls':'direct lines';notice('ORACLE READ',`It expects ${style}. Memory is capped at ${Math.round(memory()*100)}%; the gold forecast is prediction, not fate.`)};$('#purgeBtn').onclick=()=>{const keep={muted:save.muted,reduced:save.reduced,selected};save=Object.assign(defaults(),keep);persist();newDuel();notice('MEMORY PURGED','The Oracle is young again. Scores and learned lanes were erased.')};
$('#soundBtn').onclick=()=>{save.muted=!save.muted;persist();updateSettings();if(!save.muted){audioOn();tone(330,.12,'sine',.035,180)}};$('#motionBtn').onclick=()=>{save.reduced=!save.reduced;persist();updateSettings()};
function updateSettings(){$('#soundBtn').setAttribute('aria-pressed',String(!save.muted));$('#soundBtn').textContent=save.muted?'Sound off':'Sound on';$('#motionBtn').setAttribute('aria-pressed',String(!save.reduced));$('#motionBtn').textContent=save.reduced?'Motion low':'Motion full'}
window.addEventListener('keydown',e=>{if(e.key==='1')selectOrb('blue');if(e.key==='2')selectOrb('red');if(e.key==='3')selectOrb('black');if(e.code==='Space'){e.preventDefault();ability()}if(e.key.toLowerCase()==='m'){$('#soundBtn').click()}if(e.key.toLowerCase()==='r'){$('#newBtn').click()}});window.addEventListener('resize',resize);document.addEventListener('visibilitychange',()=>{last=performance.now();acc=0});
resize();updateSettings();newDuel();requestAnimationFrame(frame);
})();
</script>
